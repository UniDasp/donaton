server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service-v1
          uri: http://auth:8080
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - RewritePath=/api/v1(?<segment>/?.*), $\{segment}

        - id: bff-service
          uri: http://bff:8080
          predicates:
            - Path=/api/v1/**

      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: false

jwt:
  secret: mi_clave_secreta_muy_larga_para_hs256_segura_12345
  expiration: 86400000
